<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>
<body>

<h2>Raise Ticket</h2>

<input type="text" id="title" placeholder="Title"><br><br>
<textarea id="desc" placeholder="Description"></textarea><br><br>

<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Closed</option>
</select><br><br>

<button onclick="addTicket()">Submit</button>

<hr>

<h2>Ticket List</h2>

<table border="1" id="table">
<tr>
<th>ID</th>
<th>Title</th>
<th>Status</th>
</tr>
<tr>
<td>1</td>
<td>Login Issue</td>
<td>Open</td>
</tr>
</table>

<script>
let id = 2;

function addTicket() {
    let title = document.getElementById("title").value;
    let status = document.getElementById("status").value;

    let table = document.getElementById("table");

    let row = table.insertRow();
    row.insertCell(0).innerHTML = id++;
    row.insertCell(1).innerHTML = title;
    row.insertCell(2).innerHTML = status;
}
</script>

</body>
</html>
